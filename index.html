<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat & Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .chat-container { height: calc(100vh - 200px); }
        .message-user { background: #2563eb; border-radius: 1.5rem 1.5rem 0 1.5rem; }
        .message-ai { background: #1e293b; border-radius: 1.5rem 1.5rem 1.5rem 0; border: 1px solid #334155; }
        pre { direction: ltr !important; margin: 1rem 0; border-radius: 0.75rem; border: 1px solid #334155; }
        code { font-family: 'Fira Code', monospace !important; }
        .error-box { background: #450a0a; border: 1px solid #f87171; color: #fecaca; padding: 1rem; border-radius: 1rem; }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen">
        <aside id="sidebar" class="sidebar w-80 glass border-l border-slate-800 flex flex-col hidden md:flex">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center">
                <h1 class="text-xl font-bold text-blue-400">היסטוריה</h1>
                <button onclick="createNewChat()" class="p-2 hover:bg-slate-800 rounded-lg transition"><i class="fas fa-edit"></i></button>
            </div>
            <div id="chat-history" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
            <div class="p-5 border-t border-slate-800">
                <label class="text-[10px] text-slate-500 uppercase mb-2 block">Google AI Studio Key</label>
                <input type="password" id="api-key" placeholder="הדבק מפתח API..." class="w-full p-2 rounded bg-black/40 border border-slate-700 text-sm mb-3 focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="clearAllHistory()" class="w-full text-xs text-slate-500 hover:text-red-400">נקה הכל</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <header class="p-4 glass flex justify-between items-center">
                <select id="model-select" class="bg-slate-800 border border-slate-700 text-sm rounded-lg px-3 py-1.5 outline-none">
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                </select>
                <div class="text-center">
                    <h2 class="text-sm font-bold">Gemini AI Interface</h2>
                </div>
                <div class="w-10"></div>
            </header>

            <div id="chat-messages" class="chat-container overflow-y-auto p-4 md:p-10 space-y-6">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center opacity-30">
                    <i class="fas fa-robot text-6xl mb-4"></i>
                    <h2 class="text-xl">מוכן להתחיל?</h2>
                </div>
            </div>

            <div class="p-4 md:p-10 bg-gradient-to-t from-[#0b0f1a] w-full">
                <div class="max-w-4xl mx-auto relative">
                    <textarea id="user-input" rows="1" 
                        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"
                        placeholder="כתוב הודעה כאן..." 
                        class="w-full p-4 pr-6 pl-16 rounded-2xl glass focus:ring-2 focus:ring-blue-500 outline-none resize-none transition-all"></textarea>
                    <button onclick="sendMessage()" class="absolute left-3 bottom-3 w-10 h-10 bg-blue-600 hover:bg-blue-500 text-white rounded-xl flex items-center justify-center shadow-lg transition-all active:scale-90">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('gemini_v3_chats')) || [];
        let currentChatId = null;

        marked.setOptions({ highlight: (code) => hljs.highlightAuto(code).value, breaks: true });

        window.onload = () => {
            renderHistory();
            if (localStorage.getItem('gemini_api_key')) document.getElementById('api-key').value = localStorage.getItem('gemini_api_key');
        };

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;
            const text = input.value.trim();

            if (!text || !apiKey) return alert("אנא וודא שהזנת הודעה ומפתח API");

            localStorage.setItem('gemini_api_key', apiKey);
            if (!currentChatId) {
                currentChatId = Date.now();
                chats.push({ id: currentChatId, title: text.substring(0, 30), messages: [] });
            }

            document.getElementById('welcome-screen').style.display = 'none';
            appendMessage('user', text);
            input.value = '';
            
            const loadingId = appendMessage('ai', '<i class="fas fa-circle-notch fa-spin"></i> מעבד בקשה...');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    referrerPolicy: "no-referrer", // פותר בעיות מסוימות של CORS
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error ? errorData.error.message : "שגיאת תקשורת");
                }

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                const aiMessageDiv = document.getElementById(loadingId);
                aiMessageDiv.innerHTML = marked.parse(aiResponse);
                aiMessageDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

                const chat = chats.find(c => c.id === currentChatId);
                chat.messages.push({ role: 'user', content: text }, { role: 'ai', content: aiResponse });
                save();
                renderHistory();

            } catch (error) {
                document.getElementById(loadingId).innerHTML = `
                    <div class="error-box">
                        <strong>שגיאה:</strong> ${error.message}<br>
                        <small>וודא שה-API Key תקין ושאין חוסם פרסומות שמפריע.</small>
                    </div>`;
            }
        }

        function appendMessage(role, content) {
            const container = document.getElementById('chat-messages');
            const id = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div id="${id}" class="max-w-[85%] p-4 shadow-xl ${role === 'user' ? 'message-user' : 'message-ai'}">${role === 'ai' ? marked.parse(content) : content}</div>`;
            container.appendChild(div);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = '';
            chats.sort((a,b) => b.id - a.id).forEach(chat => {
                const el = document.createElement('div');
                el.className = `p-3 rounded-xl cursor-pointer hover:bg-slate-800 transition flex justify-between items-center group ${currentChatId === chat.id ? 'bg-slate-800' : ''}`;
                el.onclick = () => loadChat(chat.id);
                el.innerHTML = `<span class="text-sm truncate text-slate-300">${chat.title}</span>
                <button onclick="event.stopPropagation(); deleteChat(${chat.id})" class="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400"><i class="fas fa-trash text-xs"></i></button>`;
                container.appendChild(el);
            });
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('welcome-screen').style.display = 'none';
            chat.messages.forEach(m => appendMessage(m.role, m.content));
            renderHistory();
        }

        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) createNewChat();
            save(); renderHistory();
        }

        function createNewChat() {
            currentChatId = null;
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('welcome-screen').style.display = 'flex';
        }

        function save() { localStorage.setItem('gemini_v3_chats', JSON.stringify(chats)); }
        function clearAllHistory() { if(confirm("למחוק הכל?")) { chats = []; createNewChat(); save(); renderHistory(); } }
    </script>
</body>
</html>
