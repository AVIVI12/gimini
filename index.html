<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro & Flash AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .chat-container { height: calc(100vh - 200px); }
        .message-user { background: #2563eb; border-radius: 1.5rem 1.5rem 0 1.5rem; }
        .message-ai { background: #1e293b; border-radius: 1.5rem 1.5rem 1.5rem 0; border: 1px solid #334155; line-height: 1.6; }
        pre { direction: ltr !important; margin: 1rem 0; border-radius: 0.75rem; border: 1px solid #334155; }
        code { font-family: 'Fira Code', monospace !important; }
        .error-msg { background: rgba(220, 38, 38, 0.2); border: 1px solid #dc2626; color: #fca5a5; padding: 1rem; border-radius: 1rem; margin: 1rem 0; }
        .sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) { .sidebar { position: fixed; right: -100%; z-index: 50; height: 100%; } .sidebar.active { right: 0; } }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-80 glass border-l border-slate-800 flex flex-col">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center">
                <h1 class="text-xl font-bold text-blue-400">היסטוריית שיחות</h1>
                <button onclick="createNewChat()" class="p-2 hover:bg-slate-800 rounded-lg transition"><i class="fas fa-edit"></i></button>
            </div>
            <div id="chat-history" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
            <div class="p-5 border-t border-slate-800 bg-slate-900/50">
                <label class="text-xs text-slate-400 block mb-1">מפתח API (Google AI Studio):</label>
                <input type="password" id="api-key" placeholder="הכנס API Key כאן..." class="w-full p-2.5 rounded-lg bg-black/40 border border-slate-700 text-sm mb-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="clearAllHistory()" class="w-full text-xs text-slate-500 hover:text-red-400 transition">נקה היסטוריה מקומית</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative">
            <!-- Top Bar -->
            <header class="p-4 glass flex justify-between items-center z-10">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-slate-300"><i class="fas fa-bars"></i></button>
                
                <div class="flex items-center gap-3">
                    <select id="model-select" class="bg-slate-800 border border-slate-700 text-sm rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro (חכם)</option>
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash (מהיר)</option>
                    </select>
                </div>

                <div class="flex flex-col items-center">
                    <span id="status-dot" class="w-2 h-2 bg-green-500 rounded-full mb-1"></span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-widest">Connected</span>
                </div>
            </header>

            <!-- Messages Area -->
            <div id="chat-messages" class="chat-container overflow-y-auto p-4 md:p-10 space-y-8">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-50">
                    <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-sparkles text-3xl text-blue-500"></i>
                    </div>
                    <h2 class="text-2xl font-light">במה אוכל לעזור היום?</h2>
                    <p class="max-w-md text-slate-400">אני מחובר ישירות ל-Gemini. שלח לי קוד, בקשה לתמונה או סתם שאלה.</p>
                </div>
            </div>

            <!-- Input Box -->
            <div class="p-4 md:p-10 bg-gradient-to-t from-[#0b0f1a] w-full">
                <div class="max-w-4xl mx-auto relative">
                    <textarea id="user-input" rows="1" 
                        oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"
                        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"
                        placeholder="שאל אותי משהו..." 
                        class="w-full p-4 pr-6 pl-16 rounded-2xl glass focus:ring-2 focus:ring-blue-500 outline-none resize-none max-h-60 transition-all"></textarea>
                    
                    <button id="send-btn" onclick="sendMessage()" 
                        class="absolute left-3 bottom-3 w-10 h-10 bg-blue-600 hover:bg-blue-500 text-white rounded-xl flex items-center justify-center shadow-lg transition-all active:scale-90">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('gemini_v2_chats')) || [];
        let currentChatId = null;

        // הגדרות עיבוד טקסט
        marked.setOptions({
            highlight: function(code, lang) {
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        window.onload = () => {
            renderHistory();
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function createNewChat() {
            currentChatId = Date.now();
            document.getElementById('chat-messages').innerHTML = '';
            document.getElementById('welcome-screen').style.display = 'flex';
            renderHistory();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const apiKey = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;
            const text = input.value.trim();

            if (!text) return;
            if (!apiKey) {
                showError("נא להזין API Key בתחתית התפריט הצדדי.");
                return;
            }

            localStorage.setItem('gemini_api_key', apiKey);
            if (!currentChatId) {
                currentChatId = Date.now();
                chats.push({ id: currentChatId, title: text.substring(0, 30) + '...', messages: [] });
            }

            // עדכון UI
            document.getElementById('welcome-screen').style.display = 'none';
            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            const loadingId = appendMessage('ai', '<div class="flex gap-1"><span class="animate-bounce">.</span><span class="animate-bounce delay-100">.</span><span class="animate-bounce delay-200">.</span></div>');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || "שגיאת API לא ידועה");
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                const aiMessageDiv = document.getElementById(loadingId);
                
                aiMessageDiv.innerHTML = marked.parse(aiResponse);
                aiMessageDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

                // שמירה להיסטוריה
                const chat = chats.find(c => c.id === currentChatId);
                chat.messages.push({ role: 'user', content: text });
                chat.messages.push({ role: 'ai', content: aiResponse });
                save();

            } catch (error) {
                const aiMessageDiv = document.getElementById(loadingId);
                aiMessageDiv.innerHTML = `<div class="error-msg"><strong>שגיאת מערכת:</strong><br>${error.message}</div>`;
            }
        }

        function appendMessage(role, content) {
            const container = document.getElementById('chat-messages');
            const id = 'msg-' + Date.now();
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-300`;
            
            const formattedContent = role === 'ai' ? marked.parse(content) : content;

            div.innerHTML = `
                <div id="${id}" class="max-w-[85%] p-4 md:p-5 shadow-2xl ${role === 'user' ? 'message-user' : 'message-ai'}">
                    ${formattedContent}
                </div>
            `;
            
            container.appendChild(div);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            return id;
        }

        function showError(msg) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = "flex justify-center";
            div.innerHTML = `<div class="error-msg text-sm">${msg}</div>`;
            container.appendChild(div);
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = '';
            chats.sort((a,b) => b.id - a.id).forEach(chat => {
                const el = document.createElement('div');
                el.className = `p-3 rounded-xl cursor-pointer hover:bg-slate-800/50 transition flex justify-between items-center group ${currentChatId === chat.id ? 'bg-slate-800 border border-slate-700' : ''}`;
                el.onclick = () => loadChat(chat.id);
                el.innerHTML = `
                    <div class="flex items-center gap-3 truncate">
                        <i class="fas fa-message text-blue-500/50 text-xs"></i>
                        <span class="text-sm truncate text-slate-300">${chat.title}</span>
                    </div>
                    <button onclick="event.stopPropagation(); deleteChat(${chat.id})" class="opacity-0 group-hover:opacity-100 p-1 text-slate-500 hover:text-red-400 transition"><i class="fas fa-trash-alt text-xs"></i></button>
                `;
                container.appendChild(el);
            });
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            document.getElementById('welcome-screen').style.display = 'none';
            chat.messages.forEach(m => appendMessage(m.role, m.content));
            renderHistory();
        }

        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);
            if (currentChatId === id) createNewChat();
            save();
            renderHistory();
        }

        function clearAllHistory() {
            if(confirm("למחוק את כל היסטוריית השיחות?")) {
                chats = [];
                createNewChat();
                save();
            }
        }

        function save() { localStorage.setItem('gemini_v2_chats', JSON.stringify(chats)); }
    </script>
</body>
</html>
